name: Test on macOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install tsx
        run: npm install -g tsx

      - name: Install pure-dango globally
        run: npm install -g .

      - name: Test pure-dango command
        run: pure-dango docs/answer_keys/test.pds