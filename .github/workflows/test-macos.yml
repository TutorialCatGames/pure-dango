name: Test on macOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Make launcher executable
        run: chmod +x dist/PureDangoLauncher-macos

      - name: Register pure-dango command
        run: |
          chmod +x bin/pure-dango.sh
          sudo ln -s "$(pwd)/bin/pure-dango.sh" /usr/local/bin/pure-dango

      - name: Test pure-dango
        run: pure-dango docs/answer_keys/test.pds