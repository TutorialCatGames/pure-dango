name: Test on all platforms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build macOS launcher
        run: node src/scripts/build.js

      - name: Register pure-dango command
        run: |
          chmod +x bin/pure-dango.sh
          sudo ln -s -f "$(pwd)/bin/pure-dango.sh" /usr/local/bin/pure-dango

      - name: Test pure-dango
        run: pure-dango docs/answer_keys/test.pds

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Linux launcher
        run: node src/scripts/build.js

      - name: Register pure-dango command
        run: |
          chmod +x bin/pure-dango.sh
          sudo ln -s -f "$(pwd)/bin/pure-dango.sh" /usr/local/bin/pure-dango

      - name: Test pure-dango
        run: pure-dango docs/answer_keys/test.pds

  test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Windows launcher
        run: node src/scripts/build.js

      - name: Test pure-dango
        run: dist\PureDangoLauncher.exe run docs\answer_keys\test.pds